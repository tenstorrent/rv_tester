    num: 1
    cr_ac_mmrwrite:
        domain: 1
        num: ${TOP.PLATFORM.COSIM.RVFI.TOTAL_NRETS}
        fields:
            hart:
                width: 4
            order:
                width: 64
            addr:
                qualify: "{data}.mask != '0"
