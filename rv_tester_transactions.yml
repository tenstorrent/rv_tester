<%
import math
def clog2(n):
        return math.ceil(math.log2(n))
%>\

cosim:
    num: ${TOP.PLATFORM.NHARTS}
    msg:
        fields:
            count:
                width: 32

    m_csri:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS) + TOP.PLATFORM.MAX_CSR_AFTER_NRET}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.CSRLEN}
            mask:
                width: ${TOP.PLATFORM.XLEN}
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_rvfi:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            last_uop:
                width: 1
            last_insn:
                width: 1
            comp:
                width: 1
            order:
                width: 64
            insn:
                width: ${TOP.PLATFORM.ILEN}
            uop:
                width: 64
            trap:
                width: 1
            intr:
                width: 1
            cause:
                width: 64
            mode:
                width: 4
            vec_cracked:
                width: 1
            ixl:
                width: 2
            rd_addr:
                width: 6
            rd_wdata:
                width: ${TOP.PLATFORM.XLEN}
            frd_valid:
                qualify: frd_valid
                width: 1
            frd_addr:
                qualify: frd_valid
                width: 6
            frd_wdata:
                qualify: frd_valid
                width: ${TOP.PLATFORM.FLEN}
            vrd_valid:
                qualify: vrd_valid
                width: 1
            vrd_addr:
                qualify: vrd_valid
                width: 6
            vrd_wdata:
                qualify: vrd_valid
                width: ${TOP.PLATFORM.VLEN}
            csr_valid:
                qualify: csr_valid
                width: 1
            csr_addr:
                qualify: csr_valid
                width: ${TOP.PLATFORM.CSRLEN}
            csr_wdata:
                qualify: csr_valid
                width: ${TOP.PLATFORM.XLEN}
            csr_wmask:
                qualify: csr_valid
                width: ${TOP.PLATFORM.XLEN}
            pc_rdata:
                width: ${TOP.PLATFORM.VALEN}
            pc_wdata:
                width: ${TOP.PLATFORM.VALEN}
            mem_addr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.VALEN}
            mem_paddr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.PALEN}
            mem_rmask:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_rdata:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN}
            mem_wmask:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_wdata:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN}

    m_mcmi_read:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NREADS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}
            amo:
                width: 1
            amo_op:
                width: 5

    m_mcmi_insert:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NINSERTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_mcmi_bypass:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NBYPASSES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}
            amo:
                width: 1
            amo_op:
                width: 5

    m_mcmi_write:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NWRITES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.CLLEN}

    m_mcmi_ifetch_req:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIFETCHES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}

    m_mcmi_ifetch_resp:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIFETCHES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64

    m_mcmi_ievict:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIEVICTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}

    m_trap:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            cause:
                width: 64

    m_core_intr:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            mip:
                width: 64
            mip_mask:
                width: 64
            mip_assert:
                width: 64

    m_imsic_msi:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            addr:
                width: 64
            data:
                width: 512

    m_debug:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            enter:
                width: 1
            exit:
                width: 1

sysmod:
    num: 1
    tick:
        domain: 2
        num: 1
        fields:
            advance:
                width: 64
    jtag_rdata:
        domain: 2
        num: 1
        fields:
            rdata:
                width: 64

axi_sw:
    num: [${TOP.PLATFORM.AXI.TOTAL},${TOP.PLATFORM.NCIO_AXI.TOTAL},${TOP.PLATFORM.APLIC_MSI_AXI.TOTAL}]
    w:
        domain: 2
        num: 1
        fields:
            data:
                widths: [${TOP.PLATFORM.AXI.DATA_WIDTH},${TOP.PLATFORM.NCIO_AXI.DATA_WIDTH},${TOP.PLATFORM.APLIC_MSI_AXI.DATA_WIDTH}]
            strb:
                widths: [${TOP.PLATFORM.AXI.STRB_WIDTH},${TOP.PLATFORM.NCIO_AXI.STRB_WIDTH},${TOP.PLATFORM.APLIC_MSI_AXI.STRB_WIDTH}]
            last:
                widths: [1,1,1]
    aw:
        domain: 2
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI.ID_WIDTH + clog2(TOP.PLATFORM.AXI.TOTAL) + 1} ,${TOP.PLATFORM.NCIO_AXI.ID_WIDTH},${TOP.PLATFORM.APLIC_MSI_AXI.ID_WIDTH}]
            addr:
                widths: [${TOP.PLATFORM.AXI.ADDR_WIDTH},${TOP.PLATFORM.NCIO_AXI.ADDR_WIDTH},${TOP.PLATFORM.APLIC_MSI_AXI.ADDR_WIDTH}]
            len:
                widths: [8,8,8]
            size:
                widths: [3,3,3]
            burst:
                widths: [2,2,2]
            lock:
                widths: [1,1,1]
            atop:
                widths: [6,6,6]
    ar:
        domain: 2
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI.ID_WIDTH + clog2(TOP.PLATFORM.AXI.TOTAL) + 1} ,${TOP.PLATFORM.NCIO_AXI.ID_WIDTH} ,${TOP.PLATFORM.APLIC_MSI_AXI.ID_WIDTH}]
            addr:
                widths: [${TOP.PLATFORM.AXI.ADDR_WIDTH},${TOP.PLATFORM.NCIO_AXI.ADDR_WIDTH},${TOP.PLATFORM.APLIC_MSI_AXI.ADDR_WIDTH}]
            len:
                widths: [8,8,8]
            size:
                widths: [3,3,3]
            burst:
                widths: [2,2,2]
            lock:
                widths: [1,1,1]

    r_q_ptr:
        domain: 2
        num: 1
        fields:
            r_ptr:
                widths: [${TOP.PLATFORM.AXI.R_Q_PTR_MAX_LOG2},${TOP.PLATFORM.NCIO_AXI.R_Q_PTR_MAX_LOG2},${TOP.PLATFORM.APLIC_MSI_AXI.R_Q_PTR_MAX_LOG2}]

axi_sw_mst:
    num: [${TOP.PLATFORM.AXI_MST.TOTAL}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.TOTAL}, ${TOP.PLATFORM.SMC_AXI_MST.TOTAL}, ${TOP.PLATFORM.PLL_AXI_MST.TOTAL}, ${TOP.PLATFORM.PM_NW_AXI_MST.TOTAL}]

    b:
        domain: 2
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.PLL_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.PM_NW_AXI_MST.ID_WIDTH}]
            resp:
                widths: [2, 2, 2, 2, 2]

    r:
        domain: 2
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.PLL_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.PM_NW_AXI_MST.ID_WIDTH}]
            data:
                widths: [${TOP.PLATFORM.AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.PLL_AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.PM_NW_AXI_MST.DATA_WIDTH}]
            resp:
                widths: [2, 2, 2, 2, 2]
            last:
                widths: [1, 1, 1, 1, 1]

    ar_q_ptr:
        domain: 2
        num: 1
        fields:
            ar_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.PLL_AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.PM_NW_AXI_MST.AR_Q_PTR_MAX_LOG2}]

    aw_q_ptr:
        domain: 2
        num: 1
        fields:
            aw_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.PLL_AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.PM_NW_AXI_MST.AW_Q_PTR_MAX_LOG2}]

    w_q_ptr:
        domain: 2
        num: 1
        fields:
            w_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.W_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.APLIC_MMR_AXI_MST.W_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.W_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.PLL_AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.PM_NW_AXI_MST.AW_Q_PTR_MAX_LOG2}]

logger:
    num: 1
    cycle:
        domain: 1
        num: 1
        fields:
            clock:
                width: 64

