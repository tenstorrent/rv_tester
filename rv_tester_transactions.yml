<%
import math
def clog2(n):
        return math.ceil(math.log2(n))
%>\

cosim:
    num: ${TOP.PLATFORM.NHARTS}
    msg:
        fields:
            count:
                width: 32

    m_reset:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64

    m_disable_checks:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64

    m_mtime:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS) + 1}
        fields:
            cycle:
                width: 64
            mip:
                width: 64
            size:
                width: 32
            mtime:
                width: ${TOP.PLATFORM.XLEN}
            timeCsr:
                width: ${TOP.PLATFORM.XLEN}
            trap_intr:
                width: 1
            cause:
                width: 8
    
    m_mtip:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS) + 1}
        fields:
            cycle:
                width: 64
            mtip:
                width: 1
            trap_intr:
                width: 1

    m_csri:
        domain: 1
        num: ${TOP.PLATFORM.CSRI.NCSRI}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.CSRLEN}
            mask:
                width: ${TOP.PLATFORM.XLEN}
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_steps:
        domain: 1
        num: 1 
        disabling_defines: ["DISABLE_PERIODIC_COSIM"]
        fields:
            hart:
                width: 32
            n_retire:
                width: 32
            cycle:
                width: 64
            steps:
                width: 64
            skips:
                width: 64
            final_steps:
                width: 64

    m_rvfi:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            core_cycle:
                width: 64
            hart:
                width: 32
            first_uop:
                width: 1
            last_uop:
                width: 1
            ucode:
                width: 1
            priv:
                width: 4
            priv_change:
                width: 1
            set_pmode:
                width: 1
            clr_pmode:
                width: 1
            last_insn:
                width: 1
            comp:
                width: 1
            order:
                width: 64
            branch_tag:
                width: 64
            insn:
                width: ${TOP.PLATFORM.ILEN}
            uop:
                width: 64
            trap:
                width: 1
            intr:
                width: 1
            virt_mode:
                width: 1
            cause:
                width: 64
            mode:
                width: 4
            vec:
                width: 1
            flags_valid:
                width: 1
            flags:
                width: 5
            ixl:
                width: 2
            rd_addr:
                width: 6
            rd_wdata:
                width: ${TOP.PLATFORM.XLEN}
            frd_valid:
                qualify: frd_valid
                width: 1
            frd_addr:
                qualify: frd_valid
                width: 6
            frd_wdata:
                qualify: frd_valid
                width: ${TOP.PLATFORM.FLEN}
            vrd_valid:
                qualify: vrd_valid
                width: 1
            vrd_addr:
                qualify: vrd_valid
                width: 6
            vrd_wdata:
                qualify: vrd_valid
                width: ${TOP.PLATFORM.VLEN}
            csr_valid:
                qualify: csr_valid
                width: 1
            csr_addr:
                qualify: csr_valid
                width: ${TOP.PLATFORM.CSRLEN}
            csr_wdata:
                qualify: csr_valid
                width: ${TOP.PLATFORM.XLEN}
            csr_wmask:
                qualify: csr_valid
                width: ${TOP.PLATFORM.XLEN}
            pc_paddr:
                width: ${TOP.PLATFORM.VALEN}
            pc_rdata:
                width: ${TOP.PLATFORM.VALEN}
            pc_wdata:
                width: ${TOP.PLATFORM.VALEN}
            pc_error:
                width: 1
            mem_addr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.VALEN}
            mem_paddr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.PALEN}
            mem_rmask:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_rdata:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN}
            mem_wmask:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_wdata:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN}
            mem_attr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: 32
            mem_page4kX:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: 1
            mem_page4kX_attr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: 32
            mem_error:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: 1

    m_gp_regs:
        domain: 1
        num: 1 
        disabling_defines: ["DISABLE_PERIODIC_COSIM"]
        fields:
            hart:
                width: 32
            cycle:
                width: 64
            value:
                width: [[32, ${TOP.PLATFORM.XLEN}]]

    m_fp_regs:
        domain: 1
        num: 1 
        disabling_defines: ["DISABLE_PERIODIC_COSIM"]
        fields:
            hart:
                width: 32
            cycle:
                width: 64
            value:
                width: [[32, ${TOP.PLATFORM.FLEN}]]

    m_vc_regs:
        domain: 1
        num: 1 
        disabling_defines: ["DISABLE_PERIODIC_COSIM"]
        fields:
            hart:
                width: 32
            cycle:
                width: 64
            value:
                width: [[32, ${TOP.PLATFORM.VLEN}]]

    m_mcmi_read:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NREADS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            opcode:
                width: 36
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            amo:
                width: 1
            amo_op:
                width: 5
            attr:
                width: 32
            data:
                width: ${TOP.PLATFORM.XLEN}
            v_ext:
                width: 1
            data_vec:
                qualify: v_ext
                width: ${TOP.PLATFORM.VLEN}
            field:
                qualify: v_ext
                width: 8
            elem_idx:
                qualify: v_ext
                width: 8
            splat:
                qualify: v_ext
                width: 1
            elem_size:
                qualify: v_ext
                width: 8

    m_eoti_normal: &eot
        domain: 1
        num: 1 
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            icount:
                width: 64
            data:
                width: 64
            max_instr:
                width: 1

    offline_eoti:
        <<: *eot

    m_mcmi_insert:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NINSERTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}
            v_ext:
                width: 1
            data_vec:
                qualify: v_ext
                width: ${TOP.PLATFORM.VLEN}
            elem_idx:
                qualify: v_ext
                width: 8

    m_mcmi_bypass:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NBYPASSES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}
            amo:
                width: 1
            amo_op:
                width: 5
            cbo:
                width: 1
            attr:
                width: 32
            v_ext:
                width: 1
            data_vec:
                qualify: v_ext
                width: ${TOP.PLATFORM.VLEN}
            elem_idx:
                qualify: v_ext
                width: 8

    m_mcmi_write:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NWRITES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.CLLEN}
            error:
                width: 1

    m_mcmi_ifetch_req:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIFETCHES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            attr:
                width: 32

    m_mcmi_ifetch_resp:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIFETCHES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64

    m_mcmi_ievict:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIEVICTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}
    
    m_mcmi_devict:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: 52
    
    m_mcmi_flush:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: 52
    
    m_mcmi_writeback:
        domain: 1
        num: 2
        fields:
            cycle:
                width: 64
            addr:
                width: 52
    
    m_mcmi_dfetch:
        domain: 1
        num: 2
        fields:
            cycle:
                width: 64
            addr:
                width: 52

    m_trap:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            id:
                width: 2
            cause:
                width: 64
            order:
                width: 64
            pc_addr:
                width: ${TOP.PLATFORM.VALEN}
            insn:
                width: 32
            virt_mode:
                width: 1

    m_interrupt_pend:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            hw:
                width: 1
            mip:
                width: 64
            mip_set:
                width: 64
            mip_clr:
                width: 64
            seip:
                width: 1
            seip_set:
                width: 1
            seip_clr:
                width: 1
            buserr_bit:
                width: 6
            trap_intr:
                width: 1

    m_core_nmi:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            nmi_assert:
                width: 1
            nmi_cause:
                width: 64

    m_imsic_msi:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            addr:
                width: 64
            data:
                width: 32
            user:
                width: 8
            trap_intr:
                width: 1

    m_debug:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            enter:
                width: 1
            exit:
                width: 1
            haltreq:
                width: 1

sysmod:
    num: 1
    tick:
        domain: 2
        num: 1
        fields:
            advance:
                width: 64
            clocks:
                width: 64
            divisor:
                width: 64
            dut_reset_req:
                width: 1
    overlay_tick:
        domain: 2
        num: 1
        fields:
            advance:
                width: 64
    event_triggers:
        domain: 2
        num: ${TOP.PLATFORM.NHARTS}
        fields:
            data:
                width: 64
            addr:
                width: 64

axi_sw:
    num: [${TOP.PLATFORM.AXI.TOTAL},${TOP.PLATFORM.NCIO_AXI.TOTAL}]
    w:
        domain: [2,2]
        num: 1
        fields:
            data:
                widths: [${TOP.PLATFORM.AXI.DATA_WIDTH},${TOP.PLATFORM.NCIO_AXI.DATA_WIDTH}]
            strb:
                widths: [${TOP.PLATFORM.AXI.STRB_WIDTH},${TOP.PLATFORM.NCIO_AXI.STRB_WIDTH}]
            last:
                widths: [1,1]
    aw:
        domain: [2,2]
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI.ID_WIDTH + clog2(TOP.PLATFORM.AXI.TOTAL) + 1} ,${TOP.PLATFORM.NCIO_AXI.ID_WIDTH}]
            addr:
                widths: [${TOP.PLATFORM.AXI.ADDR_WIDTH},${TOP.PLATFORM.NCIO_AXI.ADDR_WIDTH}]
            len:
                widths: [8,8]
            size:
                widths: [3,3]
            burst:
                widths: [2,2]
            lock:
                widths: [1,1]
            cache:
                widths: [4,4]
            prot:
                widths: [3,3]
            qos:
                widths: [4,4]
            region:
                widths: [4,4]
            atop:
                widths: [6,6]
            user:
                widths: [1,1]
    ar:
        domain: [2,2]
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI.ID_WIDTH + clog2(TOP.PLATFORM.AXI.TOTAL) + 1} ,${TOP.PLATFORM.NCIO_AXI.ID_WIDTH}]
            addr:
                widths: [${TOP.PLATFORM.AXI.ADDR_WIDTH},${TOP.PLATFORM.NCIO_AXI.ADDR_WIDTH}]
            len:
                widths: [8,8]
            size:
                widths: [3,3]
            burst:
                widths: [2,2]
            lock:
                widths: [1,1]
            cache:
                widths: [4,4]
            prot:
                widths: [3,3]
            qos:
                widths: [4,4]
            region:
                widths: [4,4]
            user:
                widths: [1,1]

    r_q_ptr:
        domain: [2,2]
        num: 1
        fields:
            r_ptr:
                widths: [${TOP.PLATFORM.AXI.R_Q_PTR_MAX_LOG2},${TOP.PLATFORM.NCIO_AXI.R_Q_PTR_MAX_LOG2}]
            clock:
                widths: [64, 64]

    b_q_ptr:
        domain: [2,2]
        num: 1
        fields:
            r_ptr:
                widths: [${TOP.PLATFORM.AXI.B_Q_PTR_MAX_LOG2},${TOP.PLATFORM.NCIO_AXI.B_Q_PTR_MAX_LOG2}]
            clock:
                widths: [64, 64]

axi_sw_mst:
    num: [${TOP.PLATFORM.AXI_MST.TOTAL}, ${TOP.PLATFORM.SMC_AXI_MST.TOTAL}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.TOTAL}]

    b:
        domain: [2, 3, 2]
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.ID_WIDTH}]
            resp:
                widths: [2, 2, 2]

    r:
        domain: [2, 3, 2]
        num: 1
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.ID_WIDTH}]
            data:
                widths: [${TOP.PLATFORM.AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.DATA_WIDTH}]
            resp:
                widths: [2, 2, 2]
            last:
                widths: [1, 1, 1]

    ar_q_ptr:
        domain: [2, 3, 2]
        num: 1
        fields:
            ar_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.AR_Q_PTR_MAX_LOG2}]

    aw_q_ptr:
        domain: [2, 3, 2]
        num: 1
        fields:
            aw_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.AW_Q_PTR_MAX_LOG2}]

    w_q_ptr:
        domain: [2, 3, 2]
        num: 1
        fields:
            w_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.W_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.W_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.IOMMU_AXI_TR_REQ_MST.W_Q_PTR_MAX_LOG2}]

logger:
    num: 1

    cycle:
        domain: 1
        num: 1
        fields:
            clock:
                width: 64

    timestamp:
        domain: 1
        num: 1
        fields:
            timeval:
                width: 64

pmu_core:
    num: ${TOP.PLATFORM.NHARTS}
    pmcounters_core:
        domain: 1
        num: 1
        fields:
            <<: *pmcounters_core_fields
    hpmcounters_core:
        domain: 1
        num: 1
        fields:
            hpmcounter3:
                width: 64
            hpmcounter4:
                width: 64
            hpmcounter5:
                width: 64
            hpmcounter6:
                width: 64
            hpmcounter7:
                width: 64
            hpmcounter8:
                width: 64
            hpmcounter9:
                width: 64
            hpmcounter10:
                width: 64
    pmc_checker:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            terminate:
                width: 1
            event_csr:
                width: 4
            event_id:
                width: 56

pmu_sc:
    num: 1
    pmcounters_sc:
        domain: 1
        num: 1
        fields:
            <<: *pmcounters_sc_fields

reset_driver:
    num: 1
    tick:
        domain: 2
        num: 1
        fields:
            num_clocks:
                width: 64

pwrmgmt:
    num: 1
    m_tick:
        domain: 3
        num: 1
        fields:
            cycle:
                width: 32
    m_smc_axi_sp_tick:
        domain: 3
        num: 1
    m_smc_axi_csr_tick:
        domain: 3
        num: 1
    m_pcontrol_tick:
        domain: 3
        num: 1
    m_dfs_tick:
        domain: 3
        num: 1
    m_thub_tick:
        domain: 3
        num: 1
    m_force_ref_clk:
        domain: 3
        num: 1
    m_cold_reset_ack:
        domain: 3
        num: 1
    m_force_ref_clk_ack:
        domain: 3
        num: 1
    m_tj_shutdown_ack:
        domain: 3
        num: 1
    m_tj_max_ack:
        domain: 3
        num: 1

interrupts:
    num: ${TOP.PLATFORM.NHARTS}
    m_nmi_assert_tick:
        domain: 2
        num: 1

triggers:
    num: ${TOP.PLATFORM.NHARTS}
    m_event_trigger_tick:
        domain: 2
        num: 1
        fields:
            per_core_evt_vector:
                width: 32
            event_trigger:
                width: 32
    m_event_trigger_delayed_tick:
        domain: 2
        num: 1
        fields:
            per_core_evt_vector:
                width: 32
            event_trigger:
                width: 32
    m_tick:
        domain: 2
        num: 1
        fields:
            cycle:
                width: 32

__domains:
    2:
        always_block_header: "(* ZEBU_NATIVE_DPI_PROC *)" # this makes DPI imports that have no outputs be scheduled immediately
        priority: highest_priority
    3:
        always_block_header: "(* ZEBU_NATIVE_DPI_PROC *)" # this makes DPI imports that have no outputs be scheduled immediately
        priority: highest_priority
__max_byte_transfer: 896
