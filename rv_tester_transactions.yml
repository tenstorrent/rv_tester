            data:
                widths: [${TOP.PLATFORM.AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.SMC_AXI_MST.DATA_WIDTH}]
            resp:
                widths: [2, 2]
            last:
                widths: [1, 1]

    ar_q_ptr:
        domain: [2, 3]
        num: 1
        fields:
            ar_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.SMC_AXI_MST.AR_Q_PTR_MAX_LOG2}]

    aw_q_ptr:
