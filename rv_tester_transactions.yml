dm_model:
    num: 1
    dmi_status:
        domain: 2
        num: 1
        fields:
            status:
                width: 1
            commands_in_queue:
                width: 32
    dmi_req:
        domain: 2
        num: 1
        fields:
            op:
                width: 2
            addr:
                width: 7
            data:
                width: 32
            misc_signals:
                width: 8
    dmi_resp:
        domain: 2
        num: 1
        fields:
            resp:
                width: 2
            data:
                width: 32
    dm_load_cmd:
        domain: 2
        num: 1
        fields:
            addr:
                width: 27
            size:
                width: 8
            id:
                width: 17
    dm_load_data:
        domain: 2
        num: 1
        fields:
            id:
                width: 17
            data:
                width: 64
    dm_store:
        domain: 2
        num: 1
        fields:
            addr:
                width: 27
            len:
                width: 4
            data:
                width: 32

aplic_monitor:
