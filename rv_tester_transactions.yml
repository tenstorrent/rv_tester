<%
import math
def clog2(n):
        return math.ceil(math.log2(n))
%>\

cosim:
    num: ${TOP.PLATFORM.NHARTS}
    msg:
        fields:
            count:
                width: 32

    m_csri:
        domain: 1
        num: ${TOP.PLATFORM.NCSR}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.CSRLEN}
            mask:
                width: ${TOP.PLATFORM.XLEN}
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_rvfi:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            last_uop:
                width: 1
            last_insn:
                width: 1
            comp:
                width: 1
            order:
                width: 64
            insn:
                width: ${TOP.PLATFORM.ILEN}
            uop:
                width: 64
            trap:
                width: 1
            intr:
                width: 1
            cause:
                width: 64
            mode:
                width: 2
            ixl:
                width: 2
            rd_addr:
                width: 5
            rd_wdata:
                width: ${TOP.PLATFORM.XLEN}
            frd_valid:
                width: 1
            frd_addr:
                width: 5
            frd_wdata:
                width: ${TOP.PLATFORM.FLEN}
            vrd_valid:
                width: 1
            vrd_addr:
                width: 5
            vrd_wdata:
                width: ${TOP.PLATFORM.VLEN}
            csr_valid:
                width: 1
            csr_addr:
                width: ${TOP.PLATFORM.CSRLEN}
            csr_wdata:
                width: ${TOP.PLATFORM.XLEN}
            csr_wmask:
                width: ${TOP.PLATFORM.XLEN}
            pc_rdata:
                width: ${TOP.PLATFORM.VALEN}
            pc_wdata:
                width: ${TOP.PLATFORM.VALEN}
            mem_addr:
                width: ${TOP.PLATFORM.VALEN}
            mem_paddr:
                width: ${TOP.PLATFORM.PALEN}
            mem_rmask:
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_rdata:
                width: ${TOP.PLATFORM.RDLEN}
            mem_wmask:
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_wdata:
                width: ${TOP.PLATFORM.RDLEN}

    m_mcmi_read:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NREADS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_mcmi_insert:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NINSERTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_mcmi_bypass:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NBYPASSES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_mcmi_write:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NWRITES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.CLLEN}

    m_trap:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            cause:
                width: 64

    m_intr:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            mip:
                width: 64
            seip:
                width: 1
            mip_posedge:
                width: 1
            seip_posedge:
                width: 1
            seip_negedge:
                width: 1
            stip_negedge:
                width: 1

    m_debug:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            enter:
                width: 1
            exit:
                width: 1

sysmod:
    num: 1
    tick:
        domain: 2
        num: 1
        fields:
            advance:
                width: 64

axi_sw:
    num: ${TOP.PLATFORM.AXI.TOTAL}
    w:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            data:
                width: ${TOP.PLATFORM.AXI.DATA_WIDTH}
            strb:
                width: ${TOP.PLATFORM.AXI.STRB_WIDTH}
            last:
                width: 1
    aw:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                width: ${TOP.PLATFORM.AXI.ID_WIDTH + clog2(TOP.PLATFORM.AXI.TOTAL) + 1} 
            addr:
                width: ${TOP.PLATFORM.AXI.ADDR_WIDTH}
            len:
                width: 8
            size:
                width: 3
            burst:
                width: 2
            lock:
                width: 1
            atop:
                width: 6
    ar:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                width: ${TOP.PLATFORM.AXI.ID_WIDTH + clog2(TOP.PLATFORM.AXI.TOTAL) + 1} 
            addr:
                width: ${TOP.PLATFORM.AXI.ADDR_WIDTH}
            len:
                width: 8
            size:
                width: 3
            burst:
                width: 2
            lock:
                width: 1

    r_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            r_ptr:
                width: ${TOP.PLATFORM.AXI.R_Q_PTR_MAX_LOG2}

axi_sw_mst:
    num: [${TOP.PLATFORM.AXI_MST.TOTAL}, ${TOP.PLATFORM.AXI_MST2.TOTAL}]

    b:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.AXI_MST2.ID_WIDTH}]
            resp:
                widths: [2, 2]

    r:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                widths: [${TOP.PLATFORM.AXI_MST.ID_WIDTH}, ${TOP.PLATFORM.AXI_MST2.ID_WIDTH}]
            data:
                widths: [${TOP.PLATFORM.AXI_MST.DATA_WIDTH}, ${TOP.PLATFORM.AXI_MST2.DATA_WIDTH}]
            resp:
                widths: [2, 2]
            last:
                widths: [1, 1]

    ar_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            ar_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AR_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.AXI_MST.AR_Q_PTR_MAX_LOG2}]

    aw_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            aw_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.AW_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.AXI_MST.AW_Q_PTR_MAX_LOG2}]

    w_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            w_ptr:
                widths: [${TOP.PLATFORM.AXI_MST.W_Q_PTR_MAX_LOG2}, ${TOP.PLATFORM.AXI_MST.W_Q_PTR_MAX_LOG2}]

logger:
    num: 1
    cycle:
        domain: 1
        num: 1
        fields:
            clock:
                width: 64

