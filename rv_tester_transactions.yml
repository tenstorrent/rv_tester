dm_model:
    num: 1
    dmi_req:
        domain: 1
        num: 1
        fields:
            op:
                width: 2
            addr:
                width: 7
            data:
                width: 32
            misc_signals:
                width: 8
    dmi_resp:
        domain: 1
        num: 1
        fields:
            resp:
                width: 2
            data:
                width: 32
    dm_load_cmd:
        domain: 1
        num: 1
        fields:
            addr:
                width: ${TOP.PLATFORM.AXI.ADDR_WIDTH}
            size:
                width: 8
            id:
                width: ${TOP.PLATFORM.AXI_MST.ID_WIDTH}
    dm_load_data:
        domain: 1
        num: 1
        fields:
            id:
                width: ${TOP.PLATFORM.AXI_MST.ID_WIDTH}
            data:
                width: 512
    dm_store:
        domain: 1
        num: 1
        fields:
            addr:
                width: ${TOP.PLATFORM.AXI.ADDR_WIDTH}
            len:
                width: 4
            data:
                width: 32
