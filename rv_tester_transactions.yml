<%
import math
def clog2(n):
        return math.ceil(math.log2(n))
%>\

cosim:
    num: ${TOP.PLATFORM.NHARTS}
    msg:
        fields:
            count:
                width: 32

    m_csri:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS) + TOP.PLATFORM.MAX_CSR_AFTER_NRET}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.CSRLEN}
            mask:
                width: ${TOP.PLATFORM.XLEN}
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_rvfi:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            last_uop:
                width: 1
            last_insn:
                width: 1
            comp:
                width: 1
            order:
                width: 64
            insn:
                width: ${TOP.PLATFORM.ILEN}
            uop:
                width: 64
            trap:
                width: 1
            intr:
                width: 1
            cause:
                width: 64
            mode:
                width: 4
            vec_cracked:
                width: 1
            ixl:
                width: 2
            rd_addr:
                width: 6
            rd_wdata:
                width: ${TOP.PLATFORM.XLEN}
            frd_valid:
                qualify: frd_valid
                width: 1
            frd_addr:
                qualify: frd_valid
                width: 6
            frd_wdata:
                qualify: frd_valid
                width: ${TOP.PLATFORM.FLEN}
            vrd_valid:
                qualify: vrd_valid
                width: 1
            vrd_addr:
                qualify: vrd_valid
                width: 6
            vrd_wdata:
                qualify: vrd_valid
                width: ${TOP.PLATFORM.VLEN}
            csr_valid:
                qualify: csr_valid
                width: 1
            csr_addr:
                qualify: csr_valid
                width: ${TOP.PLATFORM.CSRLEN}
            csr_wdata:
                qualify: csr_valid
                width: ${TOP.PLATFORM.XLEN}
            csr_wmask:
                qualify: csr_valid
                width: ${TOP.PLATFORM.XLEN}
            pc_rdata:
                width: ${TOP.PLATFORM.VALEN}
            pc_wdata:
                width: ${TOP.PLATFORM.VALEN}
            mem_addr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.VALEN}
            mem_paddr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.PALEN}
            mem_rmask:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_rdata:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN}
            mem_wmask:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN // 8}
            mem_wdata:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: ${TOP.PLATFORM.RDLEN}
            mem_attr:
                qualify: "{data}.mem_rmask != '0 || {data}.mem_wmask != '0"
                width: 32

    m_mcmi_read:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NREADS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}
            amo:
                width: 1
            amo_op:
                width: 5

    m_mcmi_insert:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NINSERTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}

    m_mcmi_bypass:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NBYPASSES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.XLEN}
            amo:
                width: 1
            amo_op:
                width: 5

    m_mcmi_write:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NWRITES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}
            mask:
                width: 64
            data:
                width: ${TOP.PLATFORM.CLLEN}

    m_mcmi_ifetch_req:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIFETCHES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64
            addr:
                width: ${TOP.PLATFORM.PALEN}

    m_mcmi_ifetch_resp:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIFETCHES)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            order:
                width: 64

    m_mcmi_ievict:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.MCMI.NIEVICTS)}
        fields:
            cycle:
                width: 64
            hart:
                width: 32
            addr:
                width: ${TOP.PLATFORM.PALEN}

    m_trap:
        domain: 1
        num: ${max(TOP.PLATFORM.COSIM.RVFI.NRETS)}
        fields:
            cycle:
                width: 64
            cause:
                width: 64

    m_core_intr:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            mip:
                width: 64
            mip_mask:
                width: 64
            mip_assert:
                width: 64

    m_imsic_msi:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            addr:
                width: 64
            data:
                width: 512

    m_debug:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            enter:
                width: 1
            exit:
                width: 1

