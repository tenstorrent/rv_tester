cosim:
    num: 1
    msg:
        fields:
            count:
                width: 32

    m_rvfi:
        domain: 1
        num: ${TOP.CLUSTER.CORE.NRET}
        fields:
            cycle:
                width: 64
            last_uop:
                width: 1
            comp:
                width: 1
            order:
                width: 64
            insn:
                width: 32
            uop:
                width: 64
            trap:
                width: 1
            intr:
                width: 1
            cause:
                width: 64
            mode:
                width: 2
            ixl:
                width: 2
            rd_addr:
                width: 5
            rd_wdata:
                width: 64
            frd_valid:
                width: 1
            frd_addr:
                width: 5
            frd_wdata:
                width: 64
            pc_rdata:
                width: 64
            pc_wdata:
                width: 64
            mem_addr:
                width: 64
            mem_paddr:
                width: 64
            mem_rmask:
                width: 8
            mem_rdata:
                width: 64
            mem_wmask:
                width: 8
            mem_wdata:
                width: 64

    m_mcmi_read:
        domain: 1
        num: ${TOP.CLUSTER.CORE.MAX_MCM_READS}
        fields:
            cycle:
                width: 64
            order:
                width: 64
            addr:
                width: 56
            mask:
                width: 64
            data:
                width: 64

    m_mcmi_insert:
        domain: 1
        num: ${TOP.CLUSTER.CORE.MAX_MCM_INSERTS}
        fields:
            cycle:
                width: 64
            order:
                width: 64
            addr:
                width: 56
            mask:
                width: 64
            data:
                width: 64

    m_mcmi_write:
        domain: 1
        num: ${TOP.CLUSTER.CORE.MAX_MCM_WRITES}
        fields:
            cycle:
                width: 64
            addr:
                width: 56
            mask:
                width: 64
            data:
                width: 512

    m_trap:
        domain: 1
        num: ${TOP.CLUSTER.CORE.NRET}
        fields:
            cycle:
                width: 64
            cause:
                width: 64

    m_intr:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            mip:
                width: 64
            seip:
                width: 1
            mip_posedge:
                width: 1
            seip_posedge:
                width: 1
            seip_negedge:
                width: 1
            stip_negedge:
                width: 1

    m_debug:
        domain: 1
        num: 1
        fields:
            cycle:
                width: 64
            enter:
                width: 1
            exit:
                width: 1

sysmod:
    num: 1
    tick:
        domain: 2
        num: 1
        fields:
            advance:
                width: 64

axi_sw:
    num: ${TOP.PLATFORM.AXI.TOTAL}
    w:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            data:
                width: ${TOP.PLATFORM.AXI.DATA_WIDTH}
            strb:
                width: ${TOP.PLATFORM.AXI.STRB_WIDTH}
            last:
                width: 1
    aw:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                width: ${TOP.PLATFORM.AXI.ID_WIDTH}
            addr:
                width: ${TOP.PLATFORM.AXI.ADDR_WIDTH}
            len:
                width: 8
            size:
                width: 3
            burst:
                width: 2
            lock:
                width: 1
            atop:
                width: 6
    ar:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                width: ${TOP.PLATFORM.AXI.ID_WIDTH}
            addr:
                width: ${TOP.PLATFORM.AXI.ADDR_WIDTH}
            len:
                width: 8
            size:
                width: 3
            burst:
                width: 2
            lock:
                width: 1

    r_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            r_ptr:
                width: ${TOP.PLATFORM.AXI.R_Q_PTR_MAX_LOG2}

axi_sw_mst:
    num: ${TOP.PLATFORM.AXI_MST.TOTAL}

    b:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                width: ${TOP.PLATFORM.AXI_MST.ID_WIDTH}
            resp:
                width: 2

    r:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            id:
                width: ${TOP.PLATFORM.AXI_MST.ID_WIDTH}
            data:
                width: ${TOP.PLATFORM.AXI_MST.DATA_WIDTH}
            resp:
                width: 2
            last:
                width: 1

    ar_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            ar_ptr:
                width: ${TOP.PLATFORM.AXI_MST.AR_Q_PTR_MAX_LOG2}

    aw_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            aw_ptr:
                width: ${TOP.PLATFORM.AXI_MST.AW_Q_PTR_MAX_LOG2}

    w_q_ptr:
        domain: 2
        num: 1
        dummy_return: true
        fields:
            w_ptr:
                width: ${TOP.PLATFORM.AXI_MST.W_Q_PTR_MAX_LOG2}

logger:
    num: 1
    cycle:
        domain: 1
        num: 1
        fields:
            clock:
                width: 64

