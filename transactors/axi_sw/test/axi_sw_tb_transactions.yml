<%
import math
def clog2(n):
        return math.ceil(math.log2(n))
%>\

% for axi_sw in TOP.PLATFORM.AXI_SW:
<%
    name = axi_sw.NAME.lower()
    domain = axi_sw.DOMAIN
%>
${name}:
    num: ${axi_sw.SHARD}
    w:
        domain: ${domain}
        num: 1
        fields:
            data:
                width: ${axi_sw.DATA_WIDTH}
            strb:
                width: ${axi_sw.STRB_WIDTH}
            last:
                width: 1
    aw:
        domain: ${domain}
        num: 1
        fields:
            id:
                width: ${axi_sw.ID_WIDTH}
            addr:
                width: ${axi_sw.ADDR_WIDTH}
            len:
                width: 8
            size:
                width: 3
            burst:
                width: 2
            lock:
                width: 1
            cache:
                width: 4
            prot:
                width: 3
            qos:
                width: 4
            region:
                width: 4
            atop:
                width: 6
            user:
                width: 1
    ar:
        domain: ${domain}
        num: 1
        fields:
            id:
                width: ${axi_sw.ID_WIDTH}
            addr:
                width: ${axi_sw.ADDR_WIDTH}
            len:
                width: 8
            size:
                width: 3
            burst:
                width: 2
            lock:
                width: 1
            cache:
                width: 4
            prot:
                width: 3
            qos:
                width: 4
            region:
                width: 4
            user:
                width: 1
    r_q_ptr:
        domain: ${domain}
        num: 1
        fields:
            r_ptr:
                width: ${axi_sw.R_Q_PTR_MAX_LOG2}
            clock:
                width: 64
    b_q_ptr:
        domain: ${domain}
        num: 1
        fields:
            r_ptr:
                width: ${axi_sw.B_Q_PTR_MAX_LOG2}
            clock:
                width: 64
% endfor


% for axi_sw_mst in TOP.PLATFORM.AXI_SW_MST:
<%
    name = axi_sw_mst.NAME.lower()
    domain = axi_sw_mst.DOMAIN
%>
${name}:
    num: ${axi_sw_mst.SHARD}
    b:
        domain: ${domain}
        num: 1
        fields:
            id:
                width: ${axi_sw_mst.ID_WIDTH}
            resp:
                width: 2
    r:
        domain: ${domain}
        num: 1
        fields:
            id:
                width: ${axi_sw_mst.ID_WIDTH}
            data:
                width: ${axi_sw_mst.DATA_WIDTH}
            resp:
                width: 2
            last:
                width: 1
    ar_q_ptr:
        domain: ${domain}
        num: 1
        fields:
            ar_ptr:
                width: ${axi_sw_mst.AR_Q_PTR_MAX_LOG2}
    aw_q_ptr:
        domain: ${domain}
        num: 1
        fields:
            aw_ptr:
                width: ${axi_sw_mst.AW_Q_PTR_MAX_LOG2}
    w_q_ptr:
        domain: ${domain}
        num: 1
        fields:
            w_ptr:
                width: ${axi_sw_mst.W_Q_PTR_MAX_LOG2}
% endfor
