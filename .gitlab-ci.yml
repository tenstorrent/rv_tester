# TODO(open-source): re-publish the CI image on a public registry and switch
# the URL. The image is built from cvm/Containerfile and contains no internal
# Tenstorrent code; only the hosting URL is internal for now.
image:
    name: "aus-gitlab.local.tenstorrent.com:5005/riscv/dv/cvm:0.1"

include:
  # TODO(open-source): drop the internal gitlab-definitions include along with
  # `.smoke-rules-all-branches-template` / `.notify-template` references below.
  - project: 'riscv/dv/gitlab-definitions'
    ref: main
    file: 'common-definitions.yml'

stages:
    - submodule_update
    - test
    - notify

lint:
    # Verilog-side slang_lint + the bzsim-driven clang-tidy build are gone with
    # bzsim. The standalone checks (DECLARE_ grep, plusarg_lint.py) stay.
    # TODO(open-source): restore slang/verible lint via BCR rules_verible;
    # restore clang-tidy via a native bazel aspect once a public rule set lands.
    stage: test
    extends:
        - .smoke-rules-all-branches-template
    script:
        - (! git grep DECLARE_ -- '**.c' '**.cpp') || (echo "Error - DECLARE statements must be in header files"; exit 1)
        - python3 scripts/plusarg_lint.py
    timeout: 1h

build-bazel6-top:
    # Downstream consumers still run Bazel 6 + WORKSPACE; verify the top
    # //src:all targets they import still build. Sub-packages like
    # //src/transactors/axi_sw/test load @rules_verilator (bzlmod-only) and
    # aren't part of this surface — keep the build pattern narrowed to the
    # top-level //src package only (cvm's downstream-facing pattern).
    stage: test
    extends:
        - .smoke-rules-all-branches-template
    script:
        - bazel --output_user_root=./bazel_output_user_root_b6 build //src:all
    after_script:
        - chmod +w -R ./bazel_output_user_root_b6

smoke:
    stage: test
    extends:
        # TODO(open-source): remove with the gitlab-definitions include.
        - .smoke-rules-all-branches-template
    script:
        - bazel-7 --output_user_root=./bazel_output_user_root test //test/sw_testbench:all_smoke --enable_bzlmod --test_output=errors
    after_script:
        - chmod +w -R ./bazel_output_user_root

asan+ubsan:
    stage: test
    extends:
        - .smoke-rules-all-branches-template
    script:
        - bazel-7 --output_user_root=./bazel_output_user_root test //test/sw_testbench:all_smoke --enable_bzlmod --features=asan --features=ubsan --test_output=errors
    after_script:
        - chmod +w -R ./bazel_output_user_root

tsan:
    stage: test
    extends:
        - .smoke-rules-all-branches-template
    script:
        - bazel-7 --output_user_root=./bazel_output_user_root test //test/sw_testbench:all_smoke --enable_bzlmod --features=tsan --test_output=errors
    after_script:
        - chmod +w -R ./bazel_output_user_root

submodule_update:
    # TODO(open-source): drop when this repo no longer manages git submodules through the internal template.
    stage: submodule_update
    extends:
        - .submodule-update-template

# TODO(open-source): the notify_* jobs trigger an internal downstream pipeline. Drop when the repo is published.
notify_riscv_cluster:
    stage: notify
    rules:
        # https://tenstorrent.atlassian.net/wiki/spaces/RVRTLDV/pages/1421574263/Ascalon+-+Dependency+Freeze+Plan
        - if: '$CI_COMMIT_BRANCH =~ /^ascalon\/ea\/a0/ && $CI_PIPELINE_SOURCE == "push"'
    extends:
        - .notify-template
    trigger:
        project: riscv/riscv_cluster
        branch: ascalon/work/core
    variables:
        UPDATE_DIRECTORY: rv-common
        UPDATE_TARGET_BRANCH: ascalon/work/core

notify_riscv_cluster_bbl:
    stage: notify
    extends:
        - .notify-template
    trigger:
        project: riscv/riscv_cluster
        branch: babylon/work/core
    variables:
        UPDATE_DIRECTORY: rv-common
        UPDATE_TARGET_BRANCH: babylon/work/core
