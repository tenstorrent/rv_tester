include:
  - local: 'infra/container/gitlab-container.yml'
  - project: 'riscv/dv/gitlab-definitions'
    ref: main
    file: 'common-definitions.yml'

stages:
    - submodule_update
    - build
    - notify

smoke:
    extends:
        - .bzsim-template
        - .smoke-rules-all-branches-template
    stage: build
    tags:
        - jacamar-lsf
    script:
        - ${BZSIM} test smoke ${BZSIM_OPTS}
    timeout: 1h

notify_rv_common:
    stage: notify
    extends:
        - .notify-template
    trigger:
        project: riscv/rv-common

asan+ubsan:
    extends:
        - .bzsim-template
        - .smoke-rules-all-branches-template
    stage: build
    tags:
        - jacamar-lsf
    script:
        - ${BZSIM} test smoke ${BZSIM_OPTS} --config asan+ubsan
    timeout: 1h

tsan:
    extends:
        - .bzsim-template
        - .smoke-rules-all-branches-template
    stage: build
    tags:
        - jacamar-lsf
    script:
        - ${BZSIM} test smoke ${BZSIM_OPTS} --config tsan
    timeout: 1h

valgrind:
    extends:
        - .bzsim-template
        - .smoke-rules-all-branches-template
    stage: build
    tags:
        - jacamar-lsf
    script:
        # TODO(mboisvert): Clean this by adding native +valgrind support to runtime.
        - ${BZSIM} test smoke ${BZSIM_OPTS} --bazel-test-opt=--test_tag_filters=-no-valgrind --bazel-test-opt=--test_arg=--run-args=+sim_wrap=/opt/rh/gcc-toolset-11/root/bin/valgrind --bazel-test-opt=--test_arg=--run-args=+sim_wrap=--trace-children=yes --bazel-test-opt=--test_arg=--run-args=+sim_wrap=--tool=memcheck --bazel-test-opt=--test_arg=--run-args=+sim_wrap=--leak-check=full --bazel-test-opt=--test_arg=--run-args=+sim_wrap=--show-reachable=yes --bazel-test-opt=--test_arg=--run-args=+sim_wrap=--track-origins=yes --bazel-test-opt=--test_arg=--run-args=+sim_wrap=--error-exitcode=1
    timeout: 1h


submodule_update:
    stage: submodule_update
    extends:
        - .submodule-update-template

container_update:
    stage: submodule_update
    extends:
        - .container-update-template
