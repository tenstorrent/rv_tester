rv_tester: &rv_tester
  platform:
    count: 1
    type:
      - platform
    attrs:
      <<: *rv_tester_platform_attrs

    clki:
      count: *rv_tester_clk_count
      type:
        - clki
      attrs:
        <<: *rv_tester_clki_attrs

    reseti:
      count: *rv_tester_reset_count
      type:
        - reseti
      attrs:
        <<: *rv_tester_reseti_attrs

    sysmod:
      count: 1
      type:
        - sysmod
      clint:
          count: 1
          type:
            - clint
          attrs:
              clock_divisor: 100
      trickbox:
          count: 1
          type:
            - trickbox
          attrs:
              clock_divisor: 100
      smc_xtor:
          count: 1
          type:
            - smc_xtor
          attrs:
              clock_divisor: 100
    axi_sw:
      type:
        - axi_sw
        - axi
        - platform_transactor
      attrs: *platform_axi_sw_attrs

    axi_sw_mst:
      type:
        - axi_sw_mst
        - axi_mst
        - platform_transactor_mst
      attrs: *platform_axi_sw_mst_attrs

    dm_model:
      count: 1
      type:
        - dm_model

    pwrmgmt:
      count: *rv_tester_pwrmgmt_ctrl
      type:
        - pwrmgmt
      attrs:
        <<: *rv_tester_pwrmgmt_attrs

    interrupts:
      count: *rv_tester_nharts
      type:
        - interrupts

    jtag_driver:
      count: 1
      type:
        - jtag_driver

    overlay_driver:
      count: 1
      type:
        - overlay_driver
        
    snoop_gen:
      count: 1
      type:
        - snoop_gen

    trace:
      count: 1
      type:
        - trace

    cla:
      count: 1
      type:
        - cla

    triggers:
      count: *rv_tester_nharts
      type:
        - triggers

    aclint_checker:
      count: 1
      type:
        - aclint_checker

    memmap:
      count: 1
      type:
        - memmap 

    whisper_client:
      count: 1
      type:
        - whisper_client

    cosim:
      count: *rv_tester_nharts
      type:
        - cosim
      rvfi:
        count: 1
        type:
          - rvfi
        attrs:
          <<: *rv_tester_rvfi_attrs
      mcmi:
        count: 1
        type:
          - mcmi
        attrs:
          <<: *rv_tester_mcmi_attrs
      bridge:
        count: 1
        type:
          - bridge

    csri:
        count: *rv_tester_nharts
        type:
          - csri
        attrs:
          <<: *rv_tester_csri_attrs

    pmci:
      count : *rv_tester_nharts
      type:
        - pmci
      attrs:
        <<: *rv_tester_pmci_attrs
