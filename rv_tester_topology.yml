rv_tester: &rv_tester
  platform:
    count: 1
    type:
      - platform
    attrs:
      <<: *rv_tester_platform_attrs
    sysmod:
      count: 1
      type:
        - sysmod
      clint:
          count: 1
          type:
            - clint
          attrs:
              clock_divisor: 100
      trickbox:
          count: 1
          type:
            - trickbox
          attrs:
              clock_divisor: 100
    axi:
      count: *rv_tester_axi_count
      type:
        - axi
        - platform_transactor
      attrs:
        <<: *rv_tester_axi_attrs
        <<: *rv_tester_axi_sw

    ncio_axi:
      count: *rv_tester_ncio_axi_count
      type:
        - ncio_axi
        - platform_transactor
      attrs:
        <<: *rv_tester_ncio_axi_attrs
        <<: *rv_tester_axi_sw

    axi_mst:
      count: *rv_tester_axi_mst_count
      type:
        - axi_mst
        - platform_transactor_mst
      attrs:
        <<: *rv_tester_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst

    axi_mst2:
      count: *rv_tester_axi_mst2_count
      type:
        - axi_mst2
        - platform_transactor_mst
      attrs:
        <<: *rv_tester_axi_mst2_attrs
        <<: *rv_tester_axi_sw_mst

    dm_model:
      count: 1
      type:
        - dm_model

    aplic_monitor:
      count: 1
      type:
        - aplic_monitor

    cosim:
      count: *rv_tester_nharts
      type:
        - cosim
      rvfi:
        count: 1
        type:
          - rvfi
        attrs:
          <<: *rv_tester_rvfi_attrs
      mcmi:
        count: 1
        type:
          - mcmi
        attrs:
          <<: *rv_tester_mcmi_attrs
      bridge:
        count: 1
        type:
          - bridge

    pmci:
      count : *rv_tester_nharts
      type:
        - pmci
      attrs:
        <<: *rv_tester_pmci_attrs
