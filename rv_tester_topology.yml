rv_tester: &rv_tester
  platform:
    count: 1
    type:
      - platform
    attrs:
      <<: *rv_tester_platform_attrs

    clki:
      count: *rv_tester_clk_count
      type:
        - clki
      attrs:
        <<: *rv_tester_clki_attrs

    reseti:
      count: *rv_tester_reset_count
      type:
        - reseti
      attrs:
        <<: *rv_tester_reseti_attrs

    sysmod:
      count: 1
      type:
        - sysmod
      clint:
          count: 1
          type:
            - clint
          attrs:
              clock_divisor: 100
      trickbox:
          count: 1
          type:
            - trickbox
          attrs:
              clock_divisor: 100
      pll_xtor:
          count: 1
          type:
            - pll_xtor
          attrs:
              clock_divisor: 100
      pm_nw_xtor:
          count: 1
          type:
            - pm_nw_xtor
          attrs:
              clock_divisor: 100
    axi:
      count: *rv_tester_axi_count
      type:
        - axi
        - platform_transactor
      attrs:
        <<: *rv_tester_axi_attrs
        <<: *rv_tester_axi_sw

    ncio_axi:
      count: *rv_tester_ncio_axi_count
      type:
        - ncio_axi
        - platform_transactor
      attrs:
        <<: *rv_tester_ncio_axi_attrs
        <<: *rv_tester_axi_sw
    
    aplic_msi_axi:
      count: *rv_tester_aplic_msi_axi_count
      type:
        - aplic_msi_axi
        - platform_transactor
      attrs:
        <<: *rv_tester_aplic_msi_axi_attrs
        <<: *rv_tester_axi_sw

    axi_mst:
      count: *rv_tester_axi_mst_count
      type:
        - axi_mst
        - platform_transactor_mst
      attrs:
        <<: *rv_tester_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst

    aplic_mmr_axi_mst:
      count: *rv_tester_aplic_mmr_axi_mst_count
      type:
        - aplic_mmr_axi_mst
        - platform_transactor_mmr_mst
      attrs:
        <<: *rv_tester_aplic_mmr_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst
    
    smc_axi_mst:
      count: *rv_tester_smc_axi_mst_count
      type:
        - smc_axi_mst
        - platform_transactor_smc_mst
      attrs:
        <<: *rv_tester_smc_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst

    pll_axi_mst:
      count: *rv_tester_pll_axi_mst_count
      type:
        - pll_axi_mst
        - platform_transactor_pll_mst
      attrs:
        <<: *rv_tester_pll_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst

    pm_nw_axi_mst:
      count: *rv_tester_pm_nw_axi_mst_count
      type:
        - pm_nw_axi_mst
        - platform_transactor_pm_nw_mst
      attrs:
        <<: *rv_tester_pm_nw_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst
    
    dm_axi:
      count: *rv_tester_dm_axi_count
      type:
        - dm_axi
        - dm_axi_transactor
      attrs:
        <<: *rv_tester_dm_axi_attrs

    dm_model:
      count: 1
      type:
        - dm_model

    aplic_monitor:
      count: 1
      type:
        - aplic_monitor

    aclint_checker:
      count: 1
      type:
        - aclint_checker

    cosim:
      count: *rv_tester_nharts
      type:
        - cosim
      rvfi:
        count: 1
        type:
          - rvfi
        attrs:
          <<: *rv_tester_rvfi_attrs
      mcmi:
        count: 1
        type:
          - mcmi
        attrs:
          <<: *rv_tester_mcmi_attrs
      bridge:
        count: 1
        type:
          - bridge

    pmci:
      count : *rv_tester_nharts
      type:
        - pmci
      attrs:
        <<: *rv_tester_pmci_attrs
