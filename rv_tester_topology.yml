rv_tester: &rv_tester
  platform:
    count: 1
    type:
      - platform
    sysmod:
      count: 1
      type:
        - sysmod
      clint:
          count: 1
          type:
            - clint
          attrs:
              clock_divisor: 100
    cosim:
      count: 1
      type:
        - cosim

    pmu:
      count : 1
      type:
        - pmu

    axi:
      count: *rv_tester_axi_count
      type:
        - axi
        - platform_transactor
      attrs:
        <<: *rv_tester_axi_attrs
        <<: *rv_tester_axi_sw

    axi_mst:
      count: *rv_tester_axi_mst_count
      type:
        - axi_mst
        - platform_transactor_mst
      attrs:
        <<: *rv_tester_axi_mst_attrs
        <<: *rv_tester_axi_sw_mst
