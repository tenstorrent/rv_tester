# this CI file is Tenstorrent's, ignore the other one from the upstream repo
include:
  - project: 'riscv/dv/gitlab-definitions'
    ref: main
    file: 'common-definitions.yml'

stages:
    - build
    - sha_update
    - notify

dummy_smoke:
    extends:
        - .smoke-rules-all-branches-template
    stage: build
    tags:
        - jacamar-lsf
    script:
        - echo "This is just so that MRs can have a passing pipeline to auto-merge"

submodule_update:
    stage: sha_update
    extends:
        - .submodule-update-template

notify_rv_tester:
    stage: notify
    extends:
        - .notify-template
    trigger:
        project: riscv/dv/rv_tester

notify_riscv_cluster:
    stage: notify
    extends:
        - .notify-template
    trigger:
        project: riscv/riscv_cluster
        branch: ascalon/work/infra
    variables:
        UPDATE_DIRECTORY: rv-common
        UPDATE_TARGET_BRANCH: ascalon/work/infra

notify_riscv_iommu:
    stage: notify
    extends:
        - .notify-template
    trigger:
        project: riscv/riscv_iommu
